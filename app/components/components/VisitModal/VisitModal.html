<div class="visit-modal" data-visit-modal data-module="VisitModal" data-path="components" hidden>
    <div class="visit-modal__overlay" data-visit-close></div>
    <div class="visit-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="visit-modal-title">
        <div class="visit-modal__head">
            <h3 class="visit-modal__title" id="visit-modal-title">Визит</h3>
            <button type="button" class="visit-modal__close" data-visit-close aria-label="Закрыть">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>

        <form class="visit-form" data-visit-form novalidate>
            <div class="field visit-form__field">
                <span class="field__label">Сотрудник</span>
                <div class="field__control ui-select" data-select data-select-search>
                    <button type="button" class="ui-select__trigger" data-select-trigger aria-haspopup="listbox" aria-expanded="false">
                        <span class="ui-select__value" data-select-value data-placeholder="Выбрать">Выбрать</span>
                        <svg class="ui-select__caret" aria-hidden="true" focusable="false" width="16" height="16"><use href="#icon-caret"></use></svg>
                    </button>
                    <div class="ui-select__panel ui-select__panel--scroll" data-select-panel role="listbox">
                        <div class="ui-select__search">
                            <input type="text" class="ui-select__search-input" data-select-search-input placeholder="Поиск сотрудника" autocomplete="off" aria-label="Поиск сотрудника">
                        </div>
                        <button type="button" class="ui-select__option" role="option" data-value="Иванов М.С.">Иванов М.С.</button>
                        <button type="button" class="ui-select__option" role="option" data-value="Василевская М.В.">Василевская М.В.</button>
                        <button type="button" class="ui-select__option" role="option" data-value="Ковш Т.А.">Ковш Т.А.</button>
                        <button type="button" class="ui-select__option" role="option" data-value="Зайцева Д.М.">Зайцева Д.М.</button>
                        <p class="ui-select__empty" data-select-empty hidden>Ничего не найдено</p>
                    </div>
                    <input type="hidden" name="employee" value="" data-select-input data-required>
                </div>
                <span class="field__error">Выберите сотрудника</span>
            </div>

            <div class="visit-form__row">
                <div class="field visit-form__field">
                    <label class="field__label" for="visit-date">Дата</label>
                    <div class="field__control ui-datepicker" data-datepicker>
                        <input class="field__input ui-datepicker__input" id="visit-date" type="text" name="date" placeholder="дд.мм.гггг" autocomplete="off" inputmode="numeric" data-datepicker-input data-required>
                        <button type="button" class="ui-datepicker__toggle" data-datepicker-toggle aria-label="Открыть календарь">
                            <svg aria-hidden="true" focusable="false" width="20" height="20"><use href="#icon-calendar"></use></svg>
                        </button>
                    </div>
                    <span class="field__error">Укажите дату</span>
                </div>
                <div class="field visit-form__field">
                    <span class="field__label">Время</span>
                    <div class="field__control ui-select" data-select>
                        <button type="button" class="ui-select__trigger" data-select-trigger aria-haspopup="listbox" aria-expanded="false">
                            <span class="ui-select__value" data-select-value data-placeholder="чч:мм">чч:мм</span>
                            <svg class="ui-select__caret" aria-hidden="true" focusable="false" width="16" height="16"><use href="#icon-caret"></use></svg>
                        </button>
                        <div class="ui-select__panel ui-select__panel--scroll" data-select-panel role="listbox">
                            <button type="button" class="ui-select__option" role="option" data-value="09:00">09:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="09:30">09:30</button>
                            <button type="button" class="ui-select__option" role="option" data-value="10:00">10:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="10:30">10:30</button>
                            <button type="button" class="ui-select__option" role="option" data-value="11:00">11:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="11:30">11:30</button>
                            <button type="button" class="ui-select__option" role="option" data-value="12:00">12:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="13:00">13:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="14:00">14:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="15:00">15:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="16:00">16:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="17:00">17:00</button>
                            <button type="button" class="ui-select__option" role="option" data-value="18:00">18:00</button>
                        </div>
                        <input type="hidden" name="time" value="" data-select-input data-required>
                    </div>
                    <span class="field__error">Выберите время</span>
                </div>
            </div>

            <div class="field visit-form__field">
                <span class="field__label">Менеджер</span>
                <div class="field__control ui-select" data-select data-select-search>
                    <button type="button" class="ui-select__trigger" data-select-trigger aria-haspopup="listbox" aria-expanded="false">
                        <span class="ui-select__value" data-select-value data-placeholder="Выбрать">Выбрать</span>
                        <svg class="ui-select__caret" aria-hidden="true" focusable="false" width="16" height="16"><use href="#icon-caret"></use></svg>
                    </button>
                    <div class="ui-select__panel ui-select__panel--scroll" data-select-panel role="listbox">
                        <div class="ui-select__search">
                            <input type="text" class="ui-select__search-input" data-select-search-input placeholder="Поиск менеджера" autocomplete="off" aria-label="Поиск менеджера">
                        </div>
                        <button type="button" class="ui-select__option" role="option" data-value="Петров А.И.">Петров А.И.</button>
                        <button type="button" class="ui-select__option" role="option" data-value="Полководец Т.С.">Полководец Т.С.</button>
                        <p class="ui-select__empty" data-select-empty hidden>Ничего не найдено</p>
                    </div>
                    <input type="hidden" name="manager" value="" data-select-input data-required>
                </div>
                <span class="field__error">Выберите менеджера</span>
            </div>

            <div class="field visit-form__field">
                <span class="field__label">Тип визита</span>
                <div class="field__control ui-select" data-select>
                    <button type="button" class="ui-select__trigger" data-select-trigger aria-haspopup="listbox" aria-expanded="false">
                        <span class="ui-select__value" data-select-value data-placeholder="Выбрать">Выбрать</span>
                        <svg class="ui-select__caret" aria-hidden="true" focusable="false" width="16" height="16"><use href="#icon-caret"></use></svg>
                    </button>
                    <div class="ui-select__panel" data-select-panel role="listbox">
                        <button type="button" class="ui-select__option" role="option" data-value="Коучинг">Коучинг</button>
                        <button type="button" class="ui-select__option" role="option" data-value="Диагностика">Диагностика</button>
                        <button type="button" class="ui-select__option" role="option" data-value="Контроль">Контроль</button>
                    </div>
                    <input type="hidden" name="type" value="" data-select-input data-required>
                </div>
                <span class="field__error">Выберите тип визита</span>
            </div>

            <div class="field visit-form__field">
                <label class="field__label" for="visit-comment">Комментарий</label>
                <div class="field__control">
                    <textarea class="field__input field__textarea visit-form__comment" id="visit-comment" name="comment" rows="2" autocomplete="off" data-autosize data-autosize-min="2" data-autosize-max="12"></textarea>
                </div>
                <span class="field__help">Дополнительная информация по теме визита</span>
            </div>

            <div class="visit-form__divider"></div>

            <div class="visit-form__actions">
                <button type="submit" class="btn btn--sm">Сохранить</button>
                <button type="button" class="btn btn--sm btn--secondary" data-visit-close>Отмена</button>
            </div>
        </form>
    </div>
</div>
